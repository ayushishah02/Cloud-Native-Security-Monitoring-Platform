apiVersion: batch/v1
kind: Job
metadata:
  name: traffic-gen-brute
  namespace: secureworks
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: traffic-gen
        profile: brute
    spec:
      restartPolicy: Never
      containers:
        - name: traffic-gen
          image: traffic-gen:0.2
          imagePullPolicy: IfNotPresent
          env:
            - name: MODE
              value: "direct"
            - name: PROFILE
              value: "brute"
            - name: DURATION_SECONDS
              value: "60"
            - name: SEED
              value: "1337"
            - name: SERVICE
              value: "secureworks"
            - name: ENV
              value: "docker-desktop"